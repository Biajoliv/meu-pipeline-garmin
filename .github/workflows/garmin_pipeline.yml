name: Garmin Data Pipeline

on:
  schedule:
    # Corre todos os dias às 03:00 AM UTC (meia-noite no Brasil, 4:00 em Portugal)
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite-te rodar manualmente pelo site do GitHub se quiseres testar

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar o repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install garminconnect

    - name: Executar o script de extração
      env:
        GARMIN_USER: ${{ secrets.GARMIN_USER }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      run: python main.py

    - name: Guardar os novos dados no repositório
      run: |
        git config --global user.name "Garmin Bot"
        git config --global user.email "bot@garminpipeline.com"
        git add dados/*.json
        git commit -m "Atualização automática de dados: $(date +'%Y-%m-%d')" || exit 0
        git push