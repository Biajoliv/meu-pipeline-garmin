name: Garmin Data Pipeline

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar o repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar o script de extração
      env:
        GARMIN_USER: ${{ secrets.GARMIN_USER }}
        GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Guardar os novos dados no repositório
      run: |
        git config --global user.name "Garmin Bot"
        git config --global user.email "bot@garminpipeline.com"
        git add dados/*.json || true
        git commit -m "Atualização automática de dados: $(date +'%Y-%m-%d')" || exit 0
        git push
